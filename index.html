function pause() {
  if (state !== "game" && state !== "paused") return

  if (state === "game") {
    state = "paused"

    const cx = c.width / 2
    const cy = c.height / 2
    const r = Math.max(c.width, c.height) / 1.2

    const g = ctx.createRadialGradient(
      cx, cy, r * 0.1,
      cx, cy, r
    )

    g.addColorStop(0, "rgba(35, 89, 67, 0.1)")
    g.addColorStop(0.6, "rgba(24, 64, 48, 0.3)")
    g.addColorStop(1, "rgba(16, 46, 34, 0.5)")

    ctx.fillStyle = g
    ctx.fillRect(0, 0, c.width, c.height)

    ctx.fillStyle = "#fff"
    ctx.font = "24px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"
    ctx.fillText("Pausado", cx, cy)
  }
  else {
    state = "game"
  }
}

function isOnScreen(obj, margin = 0){
  return (
    obj.x + obj.w >= cameraX - margin &&
    obj.x <= cameraX + c.width + margin &&
    obj.y + obj.h >= cameraY - margin &&
    obj.y <= cameraY + c.height + margin

}

function isNearScreen(obj, range = 200){
  return (
    obj.x + obj.w >= cameraX - range &&
    obj.x <= cameraX + c.width + range
  )
}

function enemyHit(player,enemy){

if (enemy.dead || player.dead) return

if(
player.vy > 0 &&
player.y + player.h - player.vy <= enemy.y &&
player.y + player.h >= enemy.y &&
player.x + player.w > enemy.x &&
player.x < enemy.x + enemy.w
){
enemy.dead=true
enemy.animFrame = 0
enemy.state = "dead"
player.vy=-10
return "stomp"
}

if(
player.x<enemy.x+enemy.w &&
player.x+player.w>enemy.x &&
player.y<enemy.y+enemy.h &&
player.y+player.h>enemy.y &&
player.immortal
){
enemy.dead=true
enemy.animFrame = 0
enemy.state = "dead"
if(!player.pastelBoost) {
    audios.pastelDash.pause()
    audios.pastelDash.currentTime = 0

}
player.pastelBoost = 40
return "killed"
}

if(
player.x<enemy.x+enemy.w &&
player.x+player.w>enemy.x &&
player.y<enemy.y+enemy.h &&
player.y+player.h>enemy.y &&
!player.immortal
){
return "player"
}

return null
}

function solidCollision(a,b){
if(!rect(a,b))return

const dx1 = a.x + a.w - b.x
const dx2 = b.x + b.w - a.x
const dy1 = a.y + a.h - b.y
const dy2 = b.y + b.h - a.y

const minX = Math.min(dx1,dx2)
const minY = Math.min(dy1,dy2)

if(minX < minY){
if(dx1 < dx2) a.x = b.x - a.w
else a.x = b.x + b.w
}
else{
if(dy1 < dy2){
a.y = b.y - a.h
a.vy = 0
a.onGround = true
}
else{
a.y = b.y + b.h
a.vy = 0
}
}
}

function solidCollisionForStroll(a,b){
if(!rect(a,b))return

const dx1 = a.x + a.w - b.x
const dx2 = b.x + b.w - a.x
const dy1 = a.y + a.h - b.y
const dy2 = b.y + b.h - a.y

const minX = Math.min(dx1,dx2)
const minY = Math.min(dy1,dy2)

if(minX < minY){
a.vx *= -1
if(dx1 < dx2) a.x = b.x - a.w
else a.x = b.x + b.w
}
else{
if(dy1 < dy2){
a.y = b.y - a.h
a.vy = 0
a.onGround = true
}
else{
a.y = b.y + b.h
a.vy = 0
}
}
}

function createParticle(type, duration, x, y, vx = 0, vy = 0) {
     particles.push({ type: type, time: 0, duration: duration, frame: 0, x: x, y: y, vx: vx, vy: vy })
  }

let gameTime = 0
let idleTime = 0
let preservedVx = 1

function update(){
  if (state === "startScreen") return
  gameTime++
  idleTime++
  preservedVx = Math.abs(player.vx)
  
  if (player.x < 0) {
        player.x = 0 + player.vx
  }
  
  if ((player.x > levelData.exitPlat.x + 50) && !player.onExit) exit()
 
  if (player.dead && player.y < c.height) player.state = "dead"
  else if (player.onExit) player.state = "comemorating"
  else if (player.vy && player.vy > 0) {
        idleTime = 0
        player.state = "falling"
  }
  else if (player.vy && player.vy < 0) {
        idleTime = 0
        player.state = "jumping"
  }
  else if (player.vx !== 0) {
    idleTime = 0
    player.state = "walking"
} 
else {
    if (!player.dead) {
    if (idleTime > 400) player.state = "idle_long"
    else player.state = "idle"
    }
}
  
player.vx=0
if(keys.left && player.move)player.vx=
keys["down"] && !player.immortal ? -6 
: !player.immortal &&  !keys["down"] ? -4 
: player.immortal &&  !keys["down"] ? -6 
: player.immortal &&  keys["down"] ? - 8 
: -4;
if(keys.right && player.move) player.vx=
keys["down"] && !player.immortal ? 6
: !player.immortal &&  !keys["down"] ? 4
: player.immortal &&  !keys["down"] ? 6
: player.immortal &&  keys["down"] ? 8
: 4;
if(keys.jump&&(player.onGround || player.pastelBoost) && player.move){
if(player.mode === "deives") audios.jump.play()
player.vy=-13
player.onGround=false
player.onTopPlatform=false
}

player.vy+=gravity
player.pastelBoost=player.pastelBoost>5?player.pastelBoost-5:0
player.x+=player.pastelBoost?(player.vx + player.pastelBoost)*(flipPlayer ? -1 : 1):player.vx
player.y+=player.vy
player.onGround=false
player.onTopPlatform=false

flipPlayer = player.vx < 0 ? true : player.vx > 0 ? false : flipPlayer

    checkpoints[level] = true
    checkpoint.active = true
    audios.checkpoint.play()
    createParticle("checkpointStars", 5, player.x, player.y, Math.random() * 2 - 1, Math.random() * 2 - 1)
}

function drawTopPlatform(p){
    const img = platformImgs[p.type] || platformImgs.stone1
    if(!img || !img.complete) return

    const tileW = 16 * objScale
    const tileH = 512 * objScale

    let visualStart = Math.floor(p.x - cameraX - tileW)
    const startY = Math.floor(p.y - 40*objScale - cameraY)

    const tiles = Math.ceil(p.w / tileW)

    for(let i = 0; i < tiles + 2; i++){
        let sx

        if(i === 1){
            sx = 0
            visualStart = visualStart + 13
        }
        else if(i === tiles + 1){
            sx = 33
            visualStart = visualStart - 13
        }
        else{
            sx = 17
            visualStart = Math.floor(p.x - cameraX - tileW)
        }
        
        const offsetI = i === 0 ? 1 : i === 1 ? 0 : i

        ctx.drawImage(
            img,
            sx, 0, 16, 512,
            visualStart + offsetI * tileW,
            startY,
            tileW,
            tileH
        )
    }
}

function drawEnemy(enemy) {
    const size = 64
    const isDead = enemy.state === "dead"
    const isIdle = enemy.state === "idle"

    const frames = 4
    const frame = Math.floor(enemy.animFrame || 0) % frames
    const animY = isDead ? 65 : isIdle ? 128 : 0

    const drawSize = size * eneScale / 2
    const drawX = enemy.x - cameraX + enemy.w / 2 - drawSize / 2.2
    const drawY = enemy.y + enemy.h - drawSize - cameraY

    ctx.save()

    if (!isDead && enemy.vx > 0) {
        ctx.translate(drawX + drawSize, drawY)
        ctx.scale(-1, 1)
        ctx.drawImage(
            enemy.img,
            frame * size,
            animY,
            size,
            size,
            0,
            0,
            drawSize,
            drawSize
        )
    } else {
        ctx.drawImage(
            enemy.img,
            frame * size,
            animY,
            size,
            size,
            drawX,
            drawY,
            drawSize,
            drawSize
        )
    }

    ctx.restore()

    enemy.animFrame = (enemy.animFrame || 0) + (isDead && enemy.animFrame >= 4 ? -0.15 : isDead && enemy.animFrame < 4 ? 0.15 : 0.15)
}

  drawEnemy(pe)
})

enemiesRosal.forEach(r=>{
  if(r.state !== "dead" || !isOnScreen(r,50)) return
  drawEnemy(r)
})

particles.forEach(p=>{
  drawParticle(p)
})

  ctx.fillStyle = "#fff"
  ctx.font = "38px Arial"

  ctx.textAlign = "left"
  ctx.textBaseline = "bottom"
  
  if (fadeAlpha > 0) {
  ctx.fillStyle = `rgba(0,0,0,${fadeAlpha})`
  ctx.fillRect(0,0,c.width,c.height)
  }
  
  drawUi()
}

function startScreen() {
    stopSounds()
    state = "startScreen"

    ctx.fillStyle = "#000"
    ctx.fillRect(0, 0, c.width, c.height)

    ctx.fillStyle = "#fff"
    ctx.font = "38px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    const dx = c.width / 2
    const dy = c.height / 2

    ctx.fillText("Toque em qualquer", dx, dy - 30)
    ctx.fillText("lugar para jogar...", dx, dy + 30)
}

function demoFinished() {
    stopSounds()
    state = "demo"

    ctx.fillStyle = "#000"
    ctx.fillRect(0, 0, c.width, c.height)

    ctx.fillStyle = "#fff"
    ctx.font = "38px Arial"
    ctx.textAlign = "center"
    ctx.textBaseline = "middle"

    const dx = c.width / 2
    const dy = c.height / 2

    ctx.fillText("Parabéns!!", dx, dy - 30)
    ctx.fillText("Você finalizou a demo :)", dx, dy + 30)
    ctx.fillText("Reinicie se quiser jogar de novo..", dx, dy + 60)
}

let lastTime = 0
const frameTime = 1000 / 60

function loop(time){

  if(!lastTime) lastTime = time
  const delta = time - lastTime

  if(delta >= frameTime){

    lastTime = time

    if(state === "startScreen"){
      startScreen()
    }
    else if(state === "demo"){
      demoFinished()
    }
    else if(state !== "paused"){
      update()
      draw()
    }

  }

  requestAnimationFrame(loop)
}

startScreen()
